<div class="tw-bg-slate-800 tw-rounded-lg tw-overflow-hidden tw-shadow-xl tw-max-h-[90vh] tw-flex tw-flex-col">
  <!-- TELA 1: ENTRADA DE TEXTO -->
  <ng-container *ngIf="!loading && !refinedData">
    <!-- Header -->
    <div class="tw-border-b tw-border-slate-700/50 tw-px-6 tw-py-4">
      <h2 class="tw-text-xl tw-font-bold tw-text-white">Novo Card em Linguagem Natural</h2>
      <p class="tw-text-sm tw-text-slate-400 tw-mt-1">Descreva a tarefa de forma simples e clara</p>
    </div>

    <!-- Content -->
    <div class="tw-px-6 tw-py-4 tw-flex-1 tw-overflow-y-auto">
      <textarea
        [(ngModel)]="inputText"
        rows="6"
        placeholder="Ex: Criar um botão de login na página inicial com validação de email e senha..."
        class="tw-w-full tw-bg-slate-900 tw-text-white tw-border tw-border-slate-600/50 tw-rounded tw-p-3 tw-focus:border-blue-500/50 focus:tw-outline-none focus:tw-ring-1 focus:tw-ring-blue-500/30 tw-resize-none tw-placeholder-slate-500">
      </textarea>

      <!-- Mensagem de erro -->
      <div *ngIf="error" class="tw-mt-4 tw-p-3 tw-bg-red-500/20 tw-border tw-border-red-500/30 tw-rounded tw-text-red-300 tw-text-sm">
        {{ error }}
      </div>
    </div>

    <!-- Footer -->
    <div class="tw-border-t tw-border-slate-700/50 tw-px-6 tw-py-4 tw-flex tw-gap-3 tw-justify-end tw-bg-slate-900/50">
      <button
        (click)="onCancel()"
        class="tw-px-4 tw-py-2 tw-rounded tw-bg-slate-700/50 tw-text-white tw-border tw-border-slate-600/50 hover:tw-bg-slate-700/70 tw-transition-colors tw-font-medium">
        Cancelar
      </button>
      <button
        (click)="onGenerateCard()"
        [disabled]="!isGenerateButtonEnabled()"
        [class.tw-opacity-50]="!isGenerateButtonEnabled()"
        [class.tw-cursor-not-allowed]="!isGenerateButtonEnabled()"
        class="tw-px-4 tw-py-2 tw-rounded tw-bg-blue-500/20 tw-text-blue-300 tw-border tw-border-blue-500/30 hover:tw-bg-blue-500/40 hover:tw-border-blue-500/50 tw-transition-colors tw-font-medium disabled:tw-hover:bg-blue-500/20 disabled:tw-hover:border-blue-500/30">
        Gerar Card
      </button>
    </div>
  </ng-container>

  <!-- TELA 2: LOADING -->
  <ng-container *ngIf="loading && !refinedData">
    <div class="tw-border-b tw-border-slate-700/50 tw-px-6 tw-py-4">
      <h2 class="tw-text-xl tw-font-bold tw-text-white">Refinando com IA</h2>
      <p class="tw-text-sm tw-text-slate-400 tw-mt-1">Aguarde enquanto a IA processa sua descrição...</p>
    </div>

    <div class="tw-px-6 tw-py-12 tw-flex-1 tw-flex tw-flex-col tw-items-center tw-justify-center">
      <mat-spinner diameter="50" [strokeWidth]="3"></mat-spinner>
      <p class="tw-text-slate-400 tw-mt-4">Processando com o Motor MAS-IA...</p>
    </div>
  </ng-container>

  <!-- TELA 3: REVISÃO DE DADOS -->
  <ng-container *ngIf="!loading && refinedData">
    <!-- Header -->
    <div class="tw-border-b tw-border-slate-700/50 tw-px-6 tw-py-4">
      <h2 class="tw-text-xl tw-font-bold tw-text-white">Revisar e Aprovar Card</h2>
      <p class="tw-text-sm tw-text-slate-400 tw-mt-1">Edite os campos abaixo se necessário e aprove</p>
    </div>

    <!-- Content -->
    <div class="tw-px-6 tw-py-4 tw-flex-1 tw-overflow-y-auto tw-space-y-4">
      <!-- Title -->
      <div>
        <label class="tw-block tw-text-sm tw-font-medium tw-text-slate-300 tw-mb-2">Título</label>
        <input
          [(ngModel)]="refinedData.title"
          type="text"
          class="tw-w-full tw-bg-slate-900 tw-text-white tw-border tw-border-slate-600/50 tw-rounded tw-p-2 tw-text-sm focus:tw-border-blue-500/50 focus:tw-outline-none focus:tw-ring-1 focus:tw-ring-blue-500/30">
      </div>

      <!-- User Story -->
      <div>
        <label class="tw-block tw-text-sm tw-font-medium tw-text-slate-300 tw-mb-2">User Story</label>
        <textarea
          [(ngModel)]="refinedData.userStory"
          rows="4"
          class="tw-w-full tw-bg-slate-900 tw-text-white tw-border tw-border-slate-600/50 tw-rounded tw-p-2 tw-text-sm tw-resize-none focus:tw-border-blue-500/50 focus:tw-outline-none focus:tw-ring-1 focus:tw-ring-blue-500/30">
        </textarea>
      </div>

      <!-- Acceptance Criteria -->
      <div>
        <label class="tw-block tw-text-sm tw-font-medium tw-text-slate-300 tw-mb-2">Critérios de Aceitação</label>
        <div class="tw-space-y-2">
          <div *ngFor="let criteria of refinedData.acceptanceCriteria; let i = index" class="tw-flex tw-gap-2">
            <input
              [(ngModel)]="refinedData.acceptanceCriteria[i]"
              type="text"
              class="tw-flex-1 tw-bg-slate-900 tw-text-white tw-border tw-border-slate-600/50 tw-rounded tw-p-2 tw-text-sm focus:tw-border-blue-500/50 focus:tw-outline-none focus:tw-ring-1 focus:tw-ring-blue-500/30"
              placeholder="Critério de aceitação">
            <button
              (click)="removeAcceptanceCriteria(i)"
              type="button"
              class="tw-px-2 tw-py-1 tw-rounded tw-bg-red-500/20 tw-text-red-300 tw-border tw-border-red-500/30 hover:tw-bg-red-500/40 tw-transition-colors tw-text-sm">
              ✕
            </button>
          </div>
          <button
            (click)="addAcceptanceCriteria()"
            type="button"
            class="tw-mt-2 tw-px-3 tw-py-1 tw-rounded tw-bg-slate-700/50 tw-text-slate-300 tw-border tw-border-slate-600/50 hover:tw-bg-slate-700/70 tw-transition-colors tw-text-sm">
            + Adicionar Critério
          </button>
        </div>
      </div>

      <!-- Mensagem de erro -->
      <div *ngIf="error" class="tw-p-3 tw-bg-red-500/20 tw-border tw-border-red-500/30 tw-rounded tw-text-red-300 tw-text-sm">
        {{ error }}
      </div>
    </div>

    <!-- Footer -->
    <div class="tw-border-t tw-border-slate-700/50 tw-px-6 tw-py-4 tw-flex tw-gap-3 tw-justify-end tw-bg-slate-900/50">
      <button
        (click)="onBackToInput()"
        [disabled]="submitting"
        class="tw-px-4 tw-py-2 tw-rounded tw-bg-slate-700/50 tw-text-white tw-border tw-border-slate-600/50 hover:tw-bg-slate-700/70 tw-transition-colors tw-font-medium disabled:tw-opacity-50">
        ← Voltar
      </button>
      <button
        (click)="onApproveAndSend()"
        [disabled]="submitting"
        [class.tw-opacity-50]="submitting"
        [class.tw-cursor-not-allowed]="submitting"
        class="tw-px-4 tw-py-2 tw-rounded tw-bg-green-500/20 tw-text-green-300 tw-border tw-border-green-500/30 hover:tw-bg-green-500/40 hover:tw-border-green-500/50 tw-transition-colors tw-font-medium disabled:tw-hover:bg-green-500/20 disabled:tw-hover:border-green-500/30">
        <span *ngIf="!submitting">✓ Aprovar e Enviar</span>
        <span *ngIf="submitting">Enviando...</span>
      </button>
    </div>
  </ng-container>
</div>
