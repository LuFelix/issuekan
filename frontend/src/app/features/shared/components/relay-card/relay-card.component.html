<div (click)="openDetails()" 
     class="tw-block tw-p-5 tw-mb-3 tw-rounded-xl tw-shadow-sm tw-bg-slate-700 tw-transition-all tw-duration-300 tw-border tw-border-slate-600 hover:tw-border-blue-500 hover:tw-shadow-xl hover:tw--translate-y-1 tw-group tw-cursor-pointer">
  
  <!-- Header with External Link Badge and Icon -->
  <div class="tw-flex tw-items-center tw-justify-between tw-mb-3">
    <div class="tw-flex tw-items-center tw-gap-2">
      <a [href]="cardData.url" 
         target="_blank" 
         (click)="$event.stopPropagation()"
         [ngClass]="getBadgeClass()" 
         class="tw-text-[10px] tw-font-bold tw-uppercase tw-tracking-wider tw-px-2 tw-py-1 tw-rounded-full tw-shadow-sm tw-flex tw-items-center tw-gap-1 hover:tw-opacity-80 tw-transition-opacity">
        {{ cardData.type }}
        <mat-icon class="tw-text-[12px] tw-w-[12px] tw-h-[12px]">open_in_new</mat-icon>
      </a>
      <mat-icon class="tw-text-slate-400 tw-scale-75">{{ getIcon() }}</mat-icon>
    </div>
    
    @if (shouldShowTransformButton()) {
      <button (click)="emitTransformToIssue(); $event.stopPropagation()" 
              title="Transformar em Issue"
              class="tw-flex tw-items-center tw-gap-1 tw-text-slate-400 hover:tw-text-blue-400 tw-transition-colors tw-duration-200">
        <mat-icon class="tw-scale-90">rocket_launch</mat-icon>
        <span class="tw-text-xs tw-font-medium">Relay</span>
      </button>
    }
  </div>

  <!-- Title -->
  <div class="tw-mb-3">
    <h3 class="tw-text-slate-100 tw-font-bold tw-text-base group-hover:tw-text-blue-400 tw-transition-colors tw-leading-tight">
      {{ cardData.title }}
    </h3>
  </div>

  <!-- Full Description Area -->
  @if (cardData.description) {
    <div class="description-content tw-text-slate-300 tw-text-sm" [innerHTML]="cardData.description">
    </div>
  }

  <!-- Footer/Status (Sem ID) -->
  @if (cardData.status) {
    <div class="tw-flex tw-items-center tw-justify-between tw-mt-4 tw-pt-3 tw-border-t tw-border-slate-600/50">
      <p class="tw-text-slate-400 tw-text-xs tw-flex tw-items-center tw-gap-1">
        <span class="tw-w-1.5 tw-h-1.5 tw-rounded-full tw-bg-slate-500"></span>
        {{ cardData.status }}
      </p>
    </div>
  }
</div>
