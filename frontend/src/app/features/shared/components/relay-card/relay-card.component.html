
<a [href]="cardData.url" target="_blank" class="tw-block tw-p-4 tw-mb-2 tw-rounded-lg tw-shadow-md tw-bg-gray-800 hover:tw-bg-gray-700 tw-transition-colors tw-duration-200 tw-border-l-4" [ngClass]="getPlatformClass()">
  <div class="tw-flex tw-items-center tw-justify-between">
    <div class="tw-flex tw-items-center">
      <mat-icon class="tw-mr-2 tw-text-gray-400">{{ getIcon() }}</mat-icon>
      <span class="tw-text-white tw-font-medium">{{ cardData.title }}</span>
    </div>
    <button *ngIf="shouldShowTransformButton()" (click)="emitTransformToIssue()" class="tw-ml-4 tw-bg-blue-600 hover:tw-bg-blue-700 tw-text-white tw-py-1 tw-px-3 tw-rounded tw-text-sm tw-whitespace-nowrap">
      Transformar em Issue
    </button>
  </div>
  <p *ngIf="cardData.status" class="tw-text-gray-400 tw-text-sm tw-mt-1">Status: {{ cardData.status }}</p>
</a>
