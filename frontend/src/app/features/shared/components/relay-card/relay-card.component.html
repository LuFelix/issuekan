<div (click)="openDetails()" 
     class="tw-block tw-p-5 tw-mb-3 tw-rounded-xl tw-shadow-sm tw-bg-slate-800 tw-transition-all tw-duration-300 tw-border tw-border-blue-900/50 hover:tw-border-blue-500 hover:tw-shadow-xl hover:tw--translate-y-1 tw-group tw-cursor-pointer" 
     [ngClass]="getPlatformBorderClass()">
  
  <!-- Header with Badge and Icon -->
  <div class="tw-flex tw-items-center tw-justify-between tw-mb-3">
    <div class="tw-flex tw-items-center tw-gap-2">
      <span [ngClass]="getBadgeClass()" class="tw-text-[10px] tw-font-bold tw-uppercase tw-tracking-wider tw-px-2 tw-py-0.5 tw-rounded-full tw-shadow-sm">
        {{ cardData.type }}
      </span>
      <mat-icon class="tw-text-slate-400 tw-scale-75">{{ getIcon() }}</mat-icon>
    </div>
    
    @if (shouldShowTransformButton()) {
      <button (click)="emitTransformToIssue(); $event.stopPropagation()" 
              title="Transformar em Issue"
              class="tw-flex tw-items-center tw-gap-1 tw-text-slate-400 hover:tw-text-blue-400 tw-transition-colors tw-duration-200">
        <mat-icon class="tw-scale-90">rocket_launch</mat-icon>
        <span class="tw-text-xs tw-font-medium">Relay</span>
      </button>
    }
  </div>

  <!-- Title -->
  <div class="tw-mb-2">
    <h3 class="tw-text-slate-100 tw-font-semibold tw-text-base group-hover:tw-text-blue-400 tw-transition-colors tw-line-clamp-2 tw-leading-snug">
      {{ cardData.title }}
    </h3>
  </div>

  <!-- Description Preview -->
  @if (cardData.description) {
    <div class="description-preview tw-mt-2 tw-mb-3 tw-text-slate-400 tw-text-sm tw-line-clamp-3" [innerHTML]="cardData.description">
    </div>
  }

  <!-- Footer/Status -->
  <div class="tw-flex tw-items-center tw-justify-between tw-mt-4 tw-pt-3 tw-border-t tw-border-slate-700/50">
    <div class="tw-flex tw-items-center tw-gap-3">
      @if (cardData.status) {
        <p class="tw-text-slate-500 tw-text-xs tw-flex tw-items-center tw-gap-1">
          <span class="tw-w-1.5 tw-h-1.5 tw-rounded-full tw-bg-slate-500"></span>
          {{ cardData.status }}
        </p>
      }
    </div>

    <!-- External Link Pill -->
    <a [href]="cardData.url" 
       target="_blank" 
       (click)="$event.stopPropagation()"
       class="tw-inline-flex tw-items-center tw-px-2.5 tw-py-1 tw-rounded-full tw-text-[10px] tw-font-medium tw-bg-blue-600/20 tw-text-blue-400 tw-border tw-border-blue-500/30 hover:tw-bg-blue-600 hover:tw-text-white tw-transition-all">
      Ver no {{ cardData.type === 'trello' ? 'Trello' : 'GitHub' }}
      <mat-icon class="tw-text-[12px] tw-w-[12px] tw-h-[12px] tw-ml-1">open_in_new</mat-icon>
    </a>
  </div>
</div>
