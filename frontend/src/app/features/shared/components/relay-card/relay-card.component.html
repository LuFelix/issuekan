<div (click)="openDetails()" 
     class="tw-block tw-p-5 tw-mb-3 tw-rounded-xl tw-shadow-sm tw-transition-all tw-duration-300 tw-border hover:tw-border-blue-500 hover:tw-shadow-xl hover:tw--translate-y-1 tw-group tw-cursor-pointer" 
     [ngClass]="cardData.hasActiveBranch ? 'tw-border-blue-500 tw-shadow-[0_0_15px_rgba(59,130,246,0.3)] tw-bg-slate-800' : 'tw-border-slate-600 tw-bg-slate-700'">
  <div class="tw-flex tw-items-center tw-justify-between tw-mb-3">
    <div class="tw-flex tw-items-center tw-gap-2">
      
      <a [href]="cardData.url" 
         target="_blank" 
         (click)="$event.stopPropagation()"
         [ngClass]="getBadgeClass()" 
         class="tw-inline-flex tw-items-center tw-justify-center tw-gap-1.5 tw-px-2.5 tw-py-1 tw-rounded tw-no-underline hover:tw-no-underline hover:tw-opacity-80 tw-transition-opacity">
        <span class="tw-text-[10px] tw-font-bold tw-uppercase tw-tracking-wider tw-flex tw-items-center" style="line-height: 1; padding-top: 1px;">
          {{ cardData.type }}
        </span>
        <mat-icon style="font-size: 14px; width: 14px; height: 14px; line-height: 14px;">open_in_new</mat-icon>
      </a>

      <mat-icon class="tw-text-slate-400 tw-scale-75">{{ getIcon() }}</mat-icon>
    </div>
    
    @if (shouldShowTransformButton()) {
      <button (click)="emitTransformToIssue(); $event.stopPropagation()" 
              title="Transformar em Issue"
              class="tw-flex tw-items-center tw-gap-1 tw-text-slate-400 hover:tw-text-blue-400 tw-transition-colors tw-duration-200">
        <mat-icon class="tw-scale-90">rocket_launch</mat-icon>
        <span class="tw-text-xs tw-font-medium">Relay</span>
      </button>
    }
  </div>

  <div class="tw-mb-3">
    <h3 class="tw-text-slate-100 tw-font-bold tw-text-base group-hover:tw-text-blue-400 tw-transition-colors tw-leading-tight">
      {{ cardData.title }}
    </h3>
  </div>

  @if (cardData.description) {
    <div class="description-content tw-text-slate-300 tw-text-sm tw-mt-2" [innerHTML]="cardData.description">
    </div>
  }

  @if (cardData.status) {
    <div class="tw-flex tw-items-center tw-justify-between tw-mt-4 tw-pt-3 tw-border-t tw-border-slate-600/50">
      <p class="tw-text-slate-400 tw-text-xs tw-flex tw-items-center tw-gap-1">
        <span class="tw-w-1.5 tw-h-1.5 tw-rounded-full tw-bg-slate-500"></span>
        {{ cardData.status }}
      </p>
      @if (cardData.hasActiveBranch) {
        <div class="tw-flex tw-items-center tw-gap-1 tw-text-blue-400 tw-bg-blue-500/10 tw-px-2 tw-py-0.5 tw-rounded tw-border tw-border-blue-500/20 tw-ml-2">
          <mat-icon class="tw-text-[14px] tw-w-[14px] tw-h-[14px] tw-leading-none">call_split</mat-icon>
          <span class="tw-text-[9px] tw-font-bold tw-uppercase tw-tracking-wider">Em Branch</span>
        </div>
      }
    </div>
  }
</div>
